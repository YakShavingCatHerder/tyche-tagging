name: Test Module from Registry

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to test (e.g., 1.0.4)'
        required: true
        default: 'latest'

env:
  TF_VERSION: '1.6.0'

jobs:
  test-registry-module:
    name: Test Module from Registry
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TF_VERSION }}

    - name: Test Module from Registry
      run: |
        # Create a temporary directory for testing
        mkdir -p /tmp/registry-test
        cd /tmp/registry-test
        
        # Determine version to test
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          # Manual dispatch with specified version
          VERSION="${{ github.event.inputs.version }}"
          if [ "$VERSION" = "latest" ]; then
            echo "Error: Please specify a version for manual testing"
            exit 1
          fi
        else
          # Workflow run - extract version from the triggering release
          # Get the latest tag from the repository
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          if [[ $VERSION == v* ]]; then
            VERSION=${VERSION#v}
          fi
        fi
        
        echo "Testing module version: $VERSION"
        
        # Create a test configuration that uses the module from registry
        cat > main.tf << EOF
        module "tyche_tags" {
          source = "YakShavingCatHerder/tyche-tagging/aws"
          version = "$VERSION"
          
          team                = "test-team"
          project             = "registry-test"
          environment         = "test"
          cost_center         = "testing"
          organization_domain = "example.com"
        }
        
        output "tags" {
          value = module.tyche_tags.tags
        }
        EOF
        
        # Initialize and validate
        terraform init
        terraform validate
        terraform plan

    - name: Notify Terraform Registry
      if: github.event_name == 'workflow_run'
      run: |
        # Get the latest tag from the repository
        VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
        if [[ $VERSION == v* ]]; then
          VERSION=${VERSION#v}
        fi
        
        echo "Notifying Terraform Registry of new version: $VERSION"
        
        # Trigger registry resync
        curl -X POST \
          -H "Authorization: Bearer ${{ secrets.TERRAFORM_API_TOKEN }}" \
          -H "Content-Type: application/vnd.api+json" \
          "https://registry.terraform.io/api/v1/modules/YakShavingCatHerder/tyche-tagging/aws/versions" \
          -d "{
            \"data\": {
              \"type\": \"module-versions\",
              \"attributes\": {
                \"version\": \"$VERSION\"
              }
            }
          }" || echo "Registry notification failed - this may be expected if the version already exists"

    - name: Report Results
      run: |
        echo "Registry test completed successfully"
        VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
        echo "Module version $VERSION tested from Terraform Registry"
        if [ "${{ github.event_name }}" = "workflow_run" ]; then
          echo "Terraform Registry notified of new release"
        fi
