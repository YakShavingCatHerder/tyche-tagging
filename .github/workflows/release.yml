name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  TF_VERSION: '1.6.0'

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.ref_name }}
        name: Release ${{ github.ref_name }}
        body: |
          Release ${{ github.ref_name }}
          
          ## Changes
          - Module updates and improvements
          
          ## Registry Test
          The registry test workflow will automatically run to validate this release from the Terraform Registry.
        draft: false
        prerelease: false

  registry-test:
    name: Trigger Registry Test
    runs-on: ubuntu-latest
    needs: release
    if: success()
    permissions:
      actions: write
    
    steps:
    - name: Trigger Registry Test Workflow
      uses: actions/github-script@v7
      with:
        script: |
          const { data } = await github.rest.actions.createWorkflowDispatch({
            owner: context.repo.owner,
            repo: context.repo.repo,
            workflow_id: 'registry-test.yml',
            ref: context.ref
          });
          console.log('Registry test workflow triggered successfully');