name: Bug Report
description: Report a bug or issue with the tyche-tagging module
title: "[BUG] "
labels: ["bug", "needs-triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! Please provide as much detail as possible to help us reproduce and fix the issue.

  - type: dropdown
    id: module_type
    attributes:
      label: Module Type
      description: Which module is affected?
      options:
        - AWS Module
        - Azure Module (coming soon)
        - GCP Module (coming soon)
        - Documentation
        - CI/CD Workflows
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How severe is this bug?
      options:
        - Critical (module doesn't work at all)
        - High (major functionality broken)
        - Medium (minor functionality affected)
        - Low (cosmetic or edge case)
    validations:
      required: true

  - type: input
    id: terraform_version
    attributes:
      label: Terraform Version
      description: What version of Terraform are you using?
      placeholder: "1.6.0"
    validations:
      required: true

  - type: input
    id: module_version
    attributes:
      label: Module Version
      description: What version of the tyche-tagging module are you using?
      placeholder: "1.0.5"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: "Describe the bug..."
    validations:
      required: true

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
      placeholder: "What should happen?"
    validations:
      required: true

  - type: textarea
    id: actual_behavior
    attributes:
      label: Actual Behavior
      description: A clear and concise description of what actually happened.
      placeholder: "What actually happened?"
    validations:
      required: true

  - type: textarea
    id: terraform_config
    attributes:
      label: Terraform Configuration
      description: Please provide your Terraform configuration (remove any sensitive information)
      render: hcl
      placeholder: |
        module "tyche_tags" {
          source = "YakShavingCatHerder/tyche-tagging/aws"
          version = "1.0.5"
          
          team                = "my-team"
          project             = "my-project"
          environment         = "prod"
          cost_center         = "engineering"
          organization_domain = "example.com"
        }

  - type: textarea
    id: error_output
    attributes:
      label: Error Output
      description: Please paste any error messages or logs here
      render: shell
      placeholder: |
        Error: ...
        
        on main.tf line X:
        X: resource "aws_instance" "example" {

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Please provide details about your environment
      placeholder: |
        - OS: [e.g. Ubuntu 20.04]
        - Cloud Provider: [e.g. AWS]
        - Region: [e.g. us-east-1]
        - Any other relevant details

  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting this issue, you agree to follow our [Code of Conduct](https://example.com)
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true
