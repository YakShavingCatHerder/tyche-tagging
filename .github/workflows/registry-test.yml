name: Test Module from Registry

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to test (e.g., 1.0.4)'
        required: true
        default: 'latest'

env:
  TF_VERSION: '1.6.0'

jobs:
  test-registry-module:
    name: Test Module from Registry
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TF_VERSION }}

    - name: Test Module from Registry
      run: |
        # Determine version to test (before changing directories)
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          # Manual dispatch with specified version
          VERSION="${{ github.event.inputs.version }}"
          if [ "$VERSION" = "latest" ]; then
            # Use latest tag from repository when "latest" is specified
            echo "Fetching all tags from repository..."
            git fetch --tags
            VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
            if [[ $VERSION == v* ]]; then
              VERSION=${VERSION#v}
            fi
            echo "Using latest version from repository: $VERSION"
          fi
        else
          # Workflow run - extract version from the triggering release
          # Get the latest tag from the repository
          echo "Fetching all tags from repository..."
          git fetch --tags
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          if [[ $VERSION == v* ]]; then
            VERSION=${VERSION#v}
          fi
        fi
        
        # If we still have 0.0.0, try to get the latest available version from registry
        if [ "$VERSION" = "0.0.0" ]; then
          echo "No tags found in repository, checking Terraform Registry for latest version..."
          # Try to get the latest version from the registry API
          LATEST_REGISTRY_VERSION=$(curl -s "https://registry.terraform.io/v1/modules/YakShavingCatHerder/tyche-tagging/aws/versions" | jq -r '.modules[0].versions[0].version' 2>/dev/null || echo "1.0.5")
          VERSION="$LATEST_REGISTRY_VERSION"
          echo "Using latest version from Terraform Registry: $VERSION"
        fi
        
        echo "Testing module version: $VERSION"
        
        # Use the dedicated test directory
        cd tests/registry-test
        
        # Initialize and validate
        terraform init
        terraform validate
        terraform plan -var="module_version=$VERSION"

    - name: Notify Terraform Registry
      if: github.event_name == 'workflow_run'
      run: |
        # Get the latest tag from the repository
        echo "Fetching all tags from repository..."
        git fetch --tags
        VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
        if [[ $VERSION == v* ]]; then
          VERSION=${VERSION#v}
        fi
        
        # If we still have 0.0.0, try to get the latest available version from registry
        if [ "$VERSION" = "0.0.0" ]; then
          echo "No tags found in repository, checking Terraform Registry for latest version..."
          LATEST_REGISTRY_VERSION=$(curl -s "https://registry.terraform.io/v1/modules/YakShavingCatHerder/tyche-tagging/aws/versions" | jq -r '.modules[0].versions[0].version' 2>/dev/null || echo "1.0.5")
          VERSION="$LATEST_REGISTRY_VERSION"
        fi
        
        echo "Notifying Terraform Registry of new version: $VERSION"
        
        # Trigger registry resync
        curl -X POST \
          -H "Authorization: Bearer ${{ secrets.TERRAFORM_API_TOKEN }}" \
          -H "Content-Type: application/vnd.api+json" \
          "https://registry.terraform.io/api/v1/modules/YakShavingCatHerder/tyche-tagging/aws/versions" \
          -d "{
            \"data\": {
              \"type\": \"module-versions\",
              \"attributes\": {
                \"version\": \"$VERSION\"
              }
            }
          }" || echo "Registry notification failed - this may be expected if the version already exists"

    - name: Report Results
      run: |
        echo "Registry test completed successfully"
        echo "Fetching all tags from repository..."
        git fetch --tags
        VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
        if [[ $VERSION == v* ]]; then
          VERSION=${VERSION#v}
        fi
        
        # If we still have 0.0.0, try to get the latest available version from registry
        if [ "$VERSION" = "0.0.0" ]; then
          LATEST_REGISTRY_VERSION=$(curl -s "https://registry.terraform.io/v1/modules/YakShavingCatHerder/tyche-tagging/aws/versions" | jq -r '.modules[0].versions[0].version' 2>/dev/null || echo "1.0.5")
          VERSION="$LATEST_REGISTRY_VERSION"
        fi
        
        echo "Module version $VERSION tested from Terraform Registry"
        if [ "${{ github.event_name }}" = "workflow_run" ]; then
          echo "Terraform Registry notified of new release"
        fi
