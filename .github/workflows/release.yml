name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  TF_VERSION: '1.6.0'

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.ref_name }}
        name: Release ${{ github.ref_name }}
        body: |
          Release ${{ github.ref_name }}
          
          ## Changes
          - Module updates and improvements
        draft: false
        prerelease: false