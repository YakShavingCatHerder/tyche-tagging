name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

env:
  TF_VERSION: '1.6.0'

jobs:
  version-bump:
    name: Bump Version and Create Tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    outputs:
      new_version: ${{ steps.version.outputs.new_version }}
      new_tag: ${{ steps.version.outputs.new_tag }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Get latest version
      id: version
      run: |
        # Get the latest tag
        LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
        echo "Latest tag: $LATEST_TAG"
        
        # Extract version number (remove 'v' prefix)
        VERSION=${LATEST_TAG#v}
        echo "Current version: $VERSION"
        
        # Bump version based on input or default to patch
        VERSION_TYPE="${{ github.event.inputs.version_type || 'patch' }}"
        echo "Version bump type: $VERSION_TYPE"
        
        # Split version into major.minor.patch
        IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
        
        # Bump version
        case $VERSION_TYPE in
          major)
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
            ;;
          minor)
            MINOR=$((MINOR + 1))
            PATCH=0
            ;;
          patch)
            PATCH=$((PATCH + 1))
            ;;
        esac
        
        NEW_VERSION="$MAJOR.$MINOR.$PATCH"
        NEW_TAG="v$NEW_VERSION"
        
        echo "New version: $NEW_VERSION"
        echo "New tag: $NEW_TAG"
        
        echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
        echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT

    - name: Create and push tag
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git tag ${{ steps.version.outputs.new_tag }}
        git push origin ${{ steps.version.outputs.new_tag }}

  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: [version-bump]
    if: always() && (needs.version-bump.result == 'success' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/'))
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set release variables
      id: release
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [[ "${{ github.ref }}" == refs/tags/* ]]; then
          # Use existing tag
          TAG_NAME="${{ github.ref_name }}"
        else
          # Use new tag from version-bump job
          TAG_NAME="${{ needs.version-bump.outputs.new_tag }}"
        fi
        
        echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
        echo "release_name=Release $TAG_NAME" >> $GITHUB_OUTPUT

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.release.outputs.tag_name }}
        name: ${{ steps.release.outputs.release_name }}
        body: |
          Release ${{ steps.release.outputs.tag_name }}
          
          ## Changes
          - Module updates and improvements
          
          ## Registry Test
          The registry test workflow will automatically run to validate this release from the Terraform Registry.
        draft: false
        prerelease: false

  registry-test:
    name: Trigger Registry Test
    runs-on: ubuntu-latest
    needs: release
    if: success()
    permissions:
      actions: write
    
    steps:
    - name: Trigger Registry Test Workflow
      uses: actions/github-script@v7
      with:
        script: |
          const { data } = await github.rest.actions.createWorkflowDispatch({
            owner: context.repo.owner,
            repo: context.repo.repo,
            workflow_id: 'registry-test.yml',
            ref: context.ref
          });
          console.log('Registry test workflow triggered successfully');